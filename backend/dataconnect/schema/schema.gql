type User @table {
  displayName: String!
  email: String!
  role: String!
  universityId: String!
  photoUrl: String
  department: String
  major: String
  bio: String
}

type Course @table {
  courseCode: String!
  title: String!
  description: String!
  department: String!
  academicYear: Int!
  semester: String!
  syllabusUrl: String
  faculty: User
}

type Enrollment @table(key: ["student", "course"]) {
  student: User!
  course: Course!
  enrollmentDate: Date!
  grade: Float
  status: String
}

type Assignment @table {
  course: Course!
  title: String!
  description: String!
  dueDate: Timestamp!
  maxPoints: Int!
  fileUrl: String
  submissionType: String
}

type Submission @table(key: ["student", "assignment"]) {
  student: User!
  assignment: Assignment!
  submittedAt: Timestamp!
  gradeReceived: Float
  submissionText: String
  submissionFileUrl: String
  feedback: String
}

type Announcement @table {
  creator: User!
  title: String!
  content: String!
  publishedAt: Timestamp!
  targetAudience: String!
  course: Course
}