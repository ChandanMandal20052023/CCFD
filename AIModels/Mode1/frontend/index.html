<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCFD</title>

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>

<body class="bg-slate-50 text-slate-900">

    <!-- Notifications -->
    <div id="notification-container" class="fixed top-5 right-5 z-50 space-y-2"></div>

    <!-- ================= AUTH MODAL ================= -->
    <div id="registration-screen" class="hidden fixed inset-0 flex items-center justify-center bg-black/60 z-[1000]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">

            <h2 class="text-xl font-bold text-center mb-4">Login / Register</h2>

            <!-- Login -->
            <form id="login-form" class="space-y-3">
                <input id="login-email" type="email" placeholder="Email" required class="input">
                <input id="login-password" type="password" placeholder="Password" required class="input">
                <button id="login-btn" class="btn-primary w-full">Login</button>
                <p class="text-sm text-center">
                    No account? <a href="#" onclick="toggleAuth(true)" class="text-blue-600">Register</a>
                </p>
            </form>

            <!-- Register -->
            <form id="register-form" class="space-y-3 hidden">
                <input id="reg-username" placeholder="Username" required class="input">
                <input id="reg-email" type="email" placeholder="Email" required class="input">
                <input id="reg-password" type="password" placeholder="Password" required class="input">
                <button class="btn-success w-full">Create Account</button>
                <p class="text-sm text-center">
                    Have account? <a href="#" onclick="toggleAuth(false)" class="text-blue-600">Login</a>
                </p>
            </form>

        </div>
    </div>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard-screen">

        <!-- Sidebar -->
        <nav class="fixed left-0 top-0 h-full w-16 bg-white border-r flex flex-col items-center py-5 gap-6">

            <i class="fas fa-shield text-blue-600 text-xl"></i>

            <button id="nav-live" onclick="switchView('live')" class="text-blue-600">
                <i class="fas fa-chart-pie"></i>
            </button>

            <button id="nav-ml" onclick="switchView('ml')" class="text-slate-400">
                <i class="fas fa-database"></i>
            </button>

            <button onclick="logout()" class="mt-auto text-red-500">
                <i class="fas fa-power-off"></i>
            </button>
        </nav>

        <!-- Main -->
        <main class="pl-20 p-5">

            <!-- Header -->
            <div class="flex justify-between mb-6">
                <div>
                    <h1 id="dashboard-title" class="text-xl font-bold">Dashboard</h1>
                    <span class="user-name text-sm text-slate-500">Guest</span>
                </div>

                <button
                    onclick="protectedAction(() => document.getElementById('payment-modal').classList.remove('hidden'))"
                    class="btn-primary">
                    + Transaction
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                <div class="card">
                    <p>Total</p>
                    <h3 id="stat-total">—</h3>
                </div>
                <div class="card text-green-600">
                    <p>Safe</p>
                    <h3 id="stat-safe">—</h3>
                </div>
                <div class="card text-red-600">
                    <p>Fraud</p>
                    <h3 id="stat-fraud">—</h3>
                </div>
                <div class="card text-purple-600">
                    <p>Accuracy</p>
                    <h3 id="stat-accuracy">—</h3>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid md:grid-cols-2 gap-4 mb-6">
                <div class="chart-wrap card">
                    <canvas id="fraud-pie-chart"></canvas>
                </div>
                <div class="chart-wrap card">
                    <canvas id="transaction-line-chart"></canvas>
                </div>
            </div>

            <!-- Live Table -->
            <div id="live-table-container" class="card relative">
                <div id="table-loading" class="hidden absolute inset-0 bg-white/60 flex items-center justify-center z-10 rounded-xl">
                    <div class="flex items-center gap-2 text-blue-600 font-semibold">
                        <i class="fas fa-circle-notch fa-spin"></i> Loading...
                    </div>
                </div>
                <h3 class="mb-2 font-semibold">Transactions</h3>
                <table class="w-full text-sm">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Risk</th>
                            <th>Status</th>
                            <th>Response</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-tbody"></tbody>
                </table>
            </div>

            <!-- ML Table -->
            <div id="ml-table-container" class="hidden card">
                <h3 class="mb-2 font-semibold">ML Data</h3>
                <table class="w-full text-sm">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>User</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="ml-tbody"></tbody>
                </table>
            </div>

        </main>
    </div>

    <!-- ================= PAYMENT MODAL ================= -->
    <div id="payment-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[1000]">
        <div class="bg-white p-5 rounded-xl w-full max-w-sm">

            <h2 class="font-bold mb-3">New Transaction</h2>

            <form id="payment-form" class="space-y-2">
                <input id="pay-amount" type="number" placeholder="Amount" required class="input">
                <input id="pay-type" placeholder="Type" class="input">
                <input id="pay-location" placeholder="Location" class="input">
                <input id="pay-device" placeholder="Device" class="input">

                <button class="btn-primary w-full">Submit</button>
                <button type="button" onclick="document.getElementById('payment-modal').classList.add('hidden')" class="w-full text-slate-500 text-sm mt-2">Cancel</button>
            </form>

        </div>
    </div>

    <!-- ================= VERIFY MODAL ================= -->
    <div id="verify-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[1100]">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm text-center">

            <h2 class="font-bold mb-2">Verification</h2>
            <div id="verify-tx-summary" class="text-sm mb-3"></div>

            <div id="verify-options" class="space-y-2"></div>

            <button onclick="cancelVerification()" class="text-red-500 text-sm mt-3">
                Cancel
            </button>

        </div>
    </div>

    <script src="main.js"></script>

</body>

</html>
